<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>座位模板编辑 - 淘票票管理后台</title>
    <link rel="stylesheet" href="/assets/css/common.css">
    <link rel="stylesheet" href="/assets/css/admin.css">
    <style>
        /* 座位布局编辑器样式 */
        .layout-editor {
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            background: #fafafa;
            padding: 16px;
            margin-top: 16px;
        }

        .layout-editor-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid #e0e0e0;
        }

        .area-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .area-item {
            border: 1px solid #ddd;
            border-radius: 6px;
            background: #fff;
            padding: 16px;
        }

        .area-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px dashed #e0e0e0;
        }

        .area-title {
            font-weight: 600;
            color: #333;
        }

        .area-color-indicator {
            display: inline-block;
            width: 16px;
            height: 16px;
            border-radius: 3px;
            margin-left: 8px;
            vertical-align: middle;
            border: 1px solid #ddd;
        }

        .row-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-top: 12px;
        }

        .row-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px;
            background: #f9f9f9;
            border-radius: 4px;
        }

        .row-label {
            min-width: 80px;
            font-weight: 500;
        }

        .seat-preview {
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
        }

        .seat-dot {
            width: 20px;
            height: 20px;
            border-radius: 3px;
            background: #e0e0e0;
            border: 1px solid #bbb;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 9px;
            color: #666;
        }

        .seat-dot.available {
            background: #4caf50;
            border-color: #388e3c;
            color: #fff;
        }

        .stage-indicator {
            text-align: center;
            padding: 12px;
            background: linear-gradient(to bottom, #e3f2fd, #fff);
            border-radius: 4px;
            margin-bottom: 16px;
            color: #1976d2;
            font-weight: 500;
            letter-spacing: 8px;
        }

        .layout-type-selector {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
        }

        .layout-type-option {
            flex: 1;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .layout-type-option:hover {
            border-color: #1976d2;
            background: #f5f5f5;
        }

        .layout-type-option.active {
            border-color: #1976d2;
            background: #e3f2fd;
            color: #1976d2;
        }

        .layout-type-icon {
            font-size: 24px;
            margin-bottom: 4px;
        }
    </style>
</head>
<body>
    <div class="admin-layout">
        <!-- 侧边栏 -->
        <aside class="admin-sidebar">
            <div class="admin-sidebar-header">
                <div class="admin-logo">
                    <span style="font-size: 24px;">🎫</span>
                    <span>淘票票</span>
                </div>
                <div class="text-small" style="color: rgba(255,255,255,0.5); margin-top: 4px;">管理后台</div>
            </div>

            <nav class="admin-nav">
                <a href="admin-index.html" class="admin-nav-item">
                    <span class="admin-nav-icon">📊</span>
                    <span>数据概览</span>
                </a>
                <a href="admin-venues.html" class="admin-nav-item">
                    <span class="admin-nav-icon">🏟️</span>
                    <span>场馆管理</span>
                </a>
                <a href="admin-seat-templates.html" class="admin-nav-item">
                    <span class="admin-nav-icon">🪑</span>
                    <span>座位模板</span>
                </a>
                <a href="admin-events.html" class="admin-nav-item">
                    <span class="admin-nav-icon">🎭</span>
                    <span>演出管理</span>
                </a>
                <a href="admin-sessions.html" class="admin-nav-item">
                    <span class="admin-nav-icon">📅</span>
                    <span>场次管理</span>
                </a>
                <a href="admin-orders.html" class="admin-nav-item">
                    <span class="admin-nav-icon">📋</span>
                    <span>订单管理</span>
                </a>

                <div class="admin-nav-section">AI功能</div>
                <a href="admin-knowledge.html" class="admin-nav-item">
                    <span class="admin-nav-icon">📚</span>
                    <span>知识库管理</span>
                </a>
                <a href="admin-rag-config.html" class="admin-nav-item">
                    <span class="admin-nav-icon">🔍</span>
                    <span>RAG配置</span>
                </a>
                <a href="admin-templates.html" class="admin-nav-item">
                    <span class="admin-nav-icon">📢</span>
                    <span>推送模板</span>
                </a>
                <a href="admin-ai-analytics.html" class="admin-nav-item">
                    <span class="admin-nav-icon">📈</span>
                    <span>AI分析</span>
                </a>

                <div class="admin-nav-section">系统管理</div>
                <a href="admin-dashboard.html" class="admin-nav-item">
                    <span class="admin-nav-icon">📊</span>
                    <span>统计看板</span>
                </a>
                <a href="admin-config.html" class="admin-nav-item">
                    <span class="admin-nav-icon">⚙️</span>
                    <span>运营配置</span>
                </a>
                <a href="admin-logs.html" class="admin-nav-item">
                    <span class="admin-nav-icon">📝</span>
                    <span>操作日志</span>
                </a>
                <a href="admin-roles.html" class="admin-nav-item">
                    <span class="admin-nav-icon">👥</span>
                    <span>权限角色</span>
                </a>
            </nav>

            <div class="admin-sidebar-footer">
                <div class="flex" style="align-items: center; gap: 8px; margin-bottom: 8px;">
                    <div style="width: 32px; height: 32px; border-radius: 50%; background: rgba(255,255,255,0.2); display: flex; align-items: center; justify-content: center;">管</div>
                    <div style="flex: 1;">
                        <div style="font-size: 14px;">管理员</div>
                        <div class="text-small" style="opacity: 0.7;">admin@taopiaopiao.com</div>
                    </div>
                </div>
                <a href="#" class="logout-btn" style="color: rgba(255,255,255,0.5); font-size: 13px;">退出登录</a>
            </div>
        </aside>

        <!-- 主内容区 -->
        <main class="admin-main">
            <header class="admin-header">
                <div class="admin-header-title" id="pageTitle">新建座位模板</div>
                <div class="admin-header-actions">
                    <button id="cancelBtn" class="btn btn-secondary btn-small">返回列表</button>
                </div>
            </header>

            <div class="admin-content">
                <form id="templateForm" class="admin-form">
                    <!-- 基本信息 -->
                    <div class="admin-form-section">
                        <h3 class="admin-form-section-title">基本信息</h3>

                        <div class="admin-form-row">
                            <div class="form-group">
                                <label class="form-label">模板名称 <span style="color: #d32f2f;">*</span></label>
                                <input type="text" name="name" class="form-input" placeholder="请输入模板名称，如：大剧院标准模板" required>
                            </div>
                            <div class="form-group">
                                <label class="form-label">模板编码 <span style="color: #d32f2f;">*</span></label>
                                <input type="text" name="templateCode" class="form-input" placeholder="请输入模板编码，如：THEATER_STD_001" required>
                                <small class="text-muted">编码唯一，用于系统识别模板</small>
                            </div>
                        </div>

                        <div class="admin-form-row">
                            <div class="form-group">
                                <label class="form-label">关联场馆 <span style="color: #d32f2f;">*</span></label>
                                <select name="venueId" class="form-select" required>
                                    <option value="">请选择场馆</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label class="form-label">布局类型 <span style="color: #d32f2f;">*</span></label>
                                <select name="layoutType" class="form-select" required>
                                    <option value="1">普通</option>
                                    <option value="2">VIP分区</option>
                                    <option value="3">混合</option>
                                    <option value="4">自定义</option>
                                </select>
                            </div>
                        </div>

                        <div class="admin-form-row">
                            <div class="form-group">
                                <label class="form-label">总行数</label>
                                <input type="number" name="totalRows" class="form-input" placeholder="自动计算" min="1" readonly>
                            </div>
                            <div class="form-group">
                                <label class="form-label">总座位数</label>
                                <input type="number" name="totalSeats" class="form-input" placeholder="自动计算" min="1" readonly>
                            </div>
                            <div class="form-group">
                                <label class="form-label">状态</label>
                                <select name="status" class="form-select">
                                    <option value="1">启用</option>
                                    <option value="0">禁用</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <!-- 座位布局配置 -->
                    <div class="admin-form-section">
                        <div class="flex-between" style="margin-bottom: 16px;">
                            <h3 class="admin-form-section-title" style="margin-bottom: 0;">座位布局配置</h3>
                            <button type="button" id="addAreaBtn" class="btn btn-primary btn-small">+ 添加区域</button>
                        </div>

                        <!-- 布局类型可视化选择 -->
                        <div class="layout-type-selector">
                            <div class="layout-type-option" data-type="1" onclick="selectLayoutType(1)">
                                <div class="layout-type-icon">⬜</div>
                                <div>普通布局</div>
                            </div>
                            <div class="layout-type-option" data-type="2" onclick="selectLayoutType(2)">
                                <div class="layout-type-icon">💎</div>
                                <div>VIP分区</div>
                            </div>
                            <div class="layout-type-option" data-type="3" onclick="selectLayoutType(3)">
                                <div class="layout-type-icon">🎭</div>
                                <div>混合布局</div>
                            </div>
                            <div class="layout-type-option" data-type="4" onclick="selectLayoutType(4)">
                                <div class="layout-type-icon">✏️</div>
                                <div>自定义</div>
                            </div>
                        </div>

                        <!-- 舞台指示 -->
                        <div class="stage-indicator">🎭 舞台 STAGE 舞台 🎭</div>

                        <!-- 区域列表 -->
                        <div class="layout-editor">
                            <div class="layout-editor-header">
                                <span>区域列表</span>
                                <span class="text-small text-muted" id="areaSummary">共 0 个区域，0 个座位</span>
                            </div>
                            <div id="areasContainer" class="area-list">
                                <div class="text-center text-muted" style="padding: 32px;">
                                    暂无区域，请点击上方"添加区域"按钮添加
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- 提交按钮 -->
                    <div class="admin-form-section" style="border-top: 1px solid #e0e0e0; padding-top: 24px;">
                        <div class="form-group">
                            <button type="submit" id="submitBtn" class="btn btn-primary">保存模板</button>
                            <button type="button" id="draftBtn" class="btn btn-secondary">取消</button>
                        </div>
                    </div>
                </form>
            </div>
        </main>
    </div>

    <!-- 添加区域弹窗 -->
    <div id="areaModal" style="display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center;">
        <div style="background: #fff; border-radius: 8px; width: 90%; max-width: 600px; max-height: 90vh; overflow-y: auto;">
            <div style="padding: 16px; border-bottom: 1px solid #e0e0e0; display: flex; justify-content: space-between; align-items: center;">
                <h3 style="margin: 0;">添加区域</h3>
                <button type="button" onclick="closeAreaModal()" style="background: none; border: none; font-size: 20px; cursor: pointer;">&times;</button>
            </div>
            <div style="padding: 16px;">
                <div class="form-group">
                    <label class="form-label">区域编码 <span style="color: #d32f2f;">*</span></label>
                    <input type="text" id="areaCode" class="form-input" placeholder="如：A、B、VIP" maxlength="10">
                </div>
                <div class="form-group">
                    <label class="form-label">区域名称 <span style="color: #d32f2f;">*</span></label>
                    <input type="text" id="areaName" class="form-input" placeholder="如：A区、VIP区" maxlength="50">
                </div>
                <div class="admin-form-row">
                    <div class="form-group">
                        <label class="form-label">区域颜色</label>
                        <input type="color" id="areaColor" class="form-input" value="#FF6B6B" style="height: 40px;">
                    </div>
                    <div class="form-group">
                        <label class="form-label">区域价格（元）</label>
                        <input type="number" id="areaPrice" class="form-input" placeholder="选填" min="0" step="0.01">
                    </div>
                </div>

                <div style="border-top: 1px solid #e0e0e0; margin: 16px 0; padding-top: 16px;">
                    <div style="font-weight: 600; margin-bottom: 12px;">座位配置</div>
                    <div id="rowsConfigContainer">
                        <!-- 行配置动态添加 -->
                    </div>
                    <button type="button" onclick="addRowConfig()" class="btn btn-secondary btn-small" style="margin-top: 8px;">+ 添加一行</button>
                </div>
            </div>
            <div style="padding: 16px; border-top: 1px solid #e0e0e0; text-align: right;">
                <button type="button" onclick="closeAreaModal()" class="btn btn-secondary">取消</button>
                <button type="button" onclick="saveAreaModal()" class="btn btn-primary">确定</button>
            </div>
        </div>
    </div>

    <script src="/assets/js/auth.js"></script>
    <script src="/assets/js/api.js"></script>
    <script src="/assets/js/seat-template-edit.js"></script>
    <script src="/assets/js/auth-check.js"></script>
</body>
</html>
