<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>座位模板管理 - 淘票票管理后台</title>
    <link rel="stylesheet" href="/assets/css/common.css">
    <link rel="stylesheet" href="/assets/css/admin-common.css">
    <link rel="stylesheet" href="/assets/css/admin-seat-templates.css">
</head>
<body>
    <div class="admin-layout">
        <!-- 侧边栏 -->
        <aside class="admin-sidebar">
            <div class="admin-sidebar-header">
                <div class="admin-logo">
                    <span style="font-size: 24px;">🎫</span>
                    <span>淘票票</span>
                </div>
                <div class="text-small" style="color: rgba(255,255,255,0.5); margin-top: 4px;">管理后台</div>
            </div>

            <nav class="admin-nav">
                <a href="admin-index.html" class="admin-nav-item">
                    <span class="admin-nav-icon">📊</span>
                    <span>数据概览</span>
                </a>
                <a href="admin-venues.html" class="admin-nav-item">
                    <span class="admin-nav-icon">🏟️</span>
                    <span>场馆管理</span>
                </a>
                <a href="admin-seat-templates.html" class="admin-nav-item">
                    <span class="admin-nav-icon">🪑</span>
                    <span>座位模板</span>
                </a>
                <a href="admin-events.html" class="admin-nav-item">
                    <span class="admin-nav-icon">🎭</span>
                    <span>演出管理</span>
                </a>
                <a href="admin-sessions.html" class="admin-nav-item">
                    <span class="admin-nav-icon">📅</span>
                    <span>场次管理</span>
                </a>
                <a href="admin-orders.html" class="admin-nav-item">
                    <span class="admin-nav-icon">📋</span>
                    <span>订单管理</span>
                </a>

                <div class="admin-nav-section">AI功能</div>
                <a href="admin-knowledge.html" class="admin-nav-item">
                    <span class="admin-nav-icon">📚</span>
                    <span>知识库管理</span>
                </a>
                <a href="admin-rag-config.html" class="admin-nav-item">
                    <span class="admin-nav-icon">🔍</span>
                    <span>RAG配置</span>
                </a>
                <a href="admin-templates.html" class="admin-nav-item">
                    <span class="admin-nav-icon">📢</span>
                    <span>推送模板</span>
                </a>
                <a href="admin-ai-analytics.html" class="admin-nav-item">
                    <span class="admin-nav-icon">📈</span>
                    <span>AI分析</span>
                </a>

                <div class="admin-nav-section">系统管理</div>
                <a href="admin-dashboard.html" class="admin-nav-item">
                    <span class="admin-nav-icon">📊</span>
                    <span>统计看板</span>
                </a>
                <a href="admin-config.html" class="admin-nav-item">
                    <span class="admin-nav-icon">⚙️</span>
                    <span>运营配置</span>
                </a>
                <a href="admin-logs.html" class="admin-nav-item">
                    <span class="admin-nav-icon">📝</span>
                    <span>操作日志</span>
                </a>
                <a href="admin-roles.html" class="admin-nav-item">
                    <span class="admin-nav-icon">👥</span>
                    <span>权限角色</span>
                </a>
            </nav>

            <div class="admin-sidebar-footer">
                <div class="flex" style="align-items: center; gap: 8px; margin-bottom: 8px;">
                    <div style="width: 32px; height: 32px; border-radius: 50%; background: rgba(255,255,255,0.2); display: flex; align-items: center; justify-content: center;">管</div>
                    <div style="flex: 1;">
                        <div style="font-size: 14px;">管理员</div>
                        <div class="text-small" style="opacity: 0.7;">admin@taopiaopiao.com</div>
                    </div>
                </div>
                <a href="#" class="logout-btn" style="color: rgba(255,255,255,0.5); font-size: 13px;">退出登录</a>
            </div>
        </aside>

        <!-- 主内容区 -->
        <main class="admin-main">
            <header class="admin-header">
                <div class="admin-header-title">座位模板管理</div>
                <div class="admin-header-actions">
                    <a href="admin-seat-template-edit.html" class="btn btn-primary btn-small">+ 新建模板</a>
                </div>
            </header>

            <div class="admin-content">
                <!-- 筛选区 -->
                <div class="search-bar">
                    <input type="text" id="searchInput" class="search-input" placeholder="搜索模板名称或编码...">
                    <select id="venueSelect" class="form-select" style="width: 200px;">
                        <option value="">全部场馆</option>
                    </select>
                    <select id="layoutTypeSelect" class="form-select" style="width: 150px;">
                        <option value="">全部布局类型</option>
                        <option value="1">普通</option>
                        <option value="2">VIP分区</option>
                        <option value="3">混合</option>
                        <option value="4">自定义</option>
                    </select>
                    <select id="statusSelect" class="form-select" style="width: 120px;">
                        <option value="">全部状态</option>
                        <option value="1">启用</option>
                        <option value="0">禁用</option>
                    </select>
                    <button id="searchBtn" class="btn btn-secondary">查询</button>
                    <button id="resetBtn" class="btn btn-outline btn-small">重置</button>
                </div>

                <!-- 模板列表 -->
                <div class="admin-table">
                    <div class="admin-table-header">
                        <div class="admin-table-title">模板列表</div>
                    </div>
                    <table>
                        <thead>
                            <tr>
                                <th class="col-id">ID</th>
                                <th class="col-name">模板名称</th>
                                <th class="col-code">模板编码</th>
                                <th class="col-venue">关联场馆</th>
                                <th class="col-layout">布局类型</th>
                                <th class="col-seats">座位数</th>
                                <th class="col-status">状态</th>
                                <th class="col-created">创建时间</th>
                                <th class="col-action">操作</th>
                            </tr>
                        </thead>
                        <tbody id="templateTableBody">
                            <tr>
                                <td colspan="9" class="text-center text-muted">加载中...</td>
                            </tr>
                        </tbody>
                    </table>
                    <div class="admin-table-footer">
                        <div id="pageInfo" class="text-muted">显示 0-0 条，共 0 条</div>
                        <div id="paginationBtns" style="display: flex; gap: 8px;">
                            <!-- 分页按钮动态生成 -->
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="/assets/js/auth.js"></script>
    <script src="/assets/js/api.js"></script>
    <script src="/assets/js/seat-template-list.js"></script>
    <script src="/assets/js/auth-check.js"></script>
</body>
</html>
