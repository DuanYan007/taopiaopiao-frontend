<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的收藏 - 淘票票</title>
    <link rel="stylesheet" href="/assets/css/client-common.css">
    <link rel="stylesheet" href="/assets/css/client.css">
    <style>
        /* 收藏页专用样式 */
        .fav-btn {
            position: absolute;
            top: 12px;
            right: 12px;
            width: 36px;
            height: 36px;
            background: rgba(255, 255, 255, 0.95);
            border: none;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            transition: all 0.3s;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
        }

        .fav-btn:hover {
            background: white;
            transform: scale(1.1);
        }

        .fav-btn.active {
            color: #ef5350;
        }
    </style>
</head>
<body>
    <!-- 顶部导航栏 -->
    <header class="header">
        <div class="container header-inner">
            <a href="index.html" class="logo">
                <span style="font-size: 28px;">🎫</span>
                <span>淘票票</span>
            </a>

            <nav class="nav">
                <a href="index.html" class="nav-link">首页</a>
                <a href="favorites.html" class="nav-link active">我的收藏</a>
                <a href="order-center.html" class="nav-link">我的订单</a>
                <a href="notifications.html" class="nav-link">消息通知</a>
                <a href="profile.html" class="nav-link">个人中心</a>
            </nav>

            <div class="header-actions">
                <a href="ai-qa.html" class="btn btn-outline btn-small">AI助手</a>
                <div class="user-info" style="display: flex; align-items: center; gap: 8px;">
                    <!-- 动态填充用户信息 -->
                </div>
            </div>
        </div>
    </header>

    <!-- 主内容区 -->
    <main class="main-content">
        <div class="container">
            <h1 class="page-title">我的收藏</h1>

            <!-- 收藏列表容器 -->
            <div class="event-grid" id="favoritesGrid">
                <!-- 加载状态 -->
                <div class="loading-state" id="loadingState" style="grid-column: 1 / -1; display: flex;">
                    <div class="loading-spinner"></div>
                    <div class="loading-text">加载中...</div>
                </div>

                <!-- 空状态 -->
                <div class="empty-state" id="emptyState" style="grid-column: 1 / -1; display: none;">
                    <div class="empty-state-icon">💝</div>
                    <div class="empty-state-text">还没有收藏任何演出</div>
                    <a href="index.html" class="btn btn-primary" style="margin-top: 16px;">去逛逛</a>
                </div>
            </div>
        </div>
    </main>

    <!-- JavaScript -->
    <script src="/assets/js/client-api.js"></script>
    <script src="/assets/js/client-constants.js"></script>
    <script src="/assets/js/client-auth.js"></script>
    <script src="/assets/js/client-events.js"></script>
    <script src="/assets/js/client-favorites.js"></script>

    <!-- 页脚 -->
    <footer class="footer">
        <div class="container">
            <div class="footer-bottom">
                <p>Copyright © 2025 淘票票 All Rights Reserved. | 沪ICP备12345678号</p>
            </div>
        </div>
    </footer>
</body>
</html>
