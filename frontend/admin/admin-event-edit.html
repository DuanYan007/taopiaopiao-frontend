<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新建演出 - 淘票票管理后台</title>
    <link rel="stylesheet" href="/assets/css/common.css">
    <link rel="stylesheet" href="/assets/css/admin.css">
</head>
<body>
    <div class="admin-layout">
        <!-- 侧边栏 -->
        <aside class="admin-sidebar">
            <div class="admin-sidebar-header">
                <div class="admin-logo">
                    <span style="font-size: 24px;">🎫</span>
                    <span>淘票票</span>
                </div>
                <div class="text-small" style="color: rgba(255,255,255,0.5); margin-top: 4px;">管理后台</div>
            </div>

            <nav class="admin-nav">
                <a href="admin-index.html" class="admin-nav-item">
                    <span class="admin-nav-icon">📊</span>
                    <span>数据概览</span>
                </a>
                <a href="admin-venues.html" class="admin-nav-item">
                    <span class="admin-nav-icon">🏟️</span>
                    <span>场馆管理</span>
                </a>
                <a href="admin-seat-templates.html" class="admin-nav-item">
                    <span class="admin-nav-icon">🪑</span>
                    <span>座位模板</span>
                </a>
                <a href="admin-events.html" class="admin-nav-item">
                    <span class="admin-nav-icon">🎭</span>
                    <span>演出管理</span>
                </a>
                <a href="admin-sessions.html" class="admin-nav-item">
                    <span class="admin-nav-icon">📅</span>
                    <span>场次管理</span>
                </a>
                <a href="admin-orders.html" class="admin-nav-item">
                    <span class="admin-nav-icon">📋</span>
                    <span>订单管理</span>
                </a>

                <div class="admin-nav-section">AI功能</div>
                <a href="admin-knowledge.html" class="admin-nav-item">
                    <span class="admin-nav-icon">📚</span>
                    <span>知识库管理</span>
                </a>
                <a href="admin-rag-config.html" class="admin-nav-item">
                    <span class="admin-nav-icon">🔍</span>
                    <span>RAG配置</span>
                </a>
                <a href="admin-templates.html" class="admin-nav-item">
                    <span class="admin-nav-icon">📢</span>
                    <span>推送模板</span>
                </a>
                <a href="admin-ai-analytics.html" class="admin-nav-item">
                    <span class="admin-nav-icon">📈</span>
                    <span>AI分析</span>
                </a>

                <div class="admin-nav-section">系统管理</div>
                <a href="admin-dashboard.html" class="admin-nav-item">
                    <span class="admin-nav-icon">📊</span>
                    <span>统计看板</span>
                </a>
                <a href="admin-config.html" class="admin-nav-item">
                    <span class="admin-nav-icon">⚙️</span>
                    <span>运营配置</span>
                </a>
                <a href="admin-logs.html" class="admin-nav-item">
                    <span class="admin-nav-icon">📝</span>
                    <span>操作日志</span>
                </a>
                <a href="admin-roles.html" class="admin-nav-item">
                    <span class="admin-nav-icon">👥</span>
                    <span>权限角色</span>
                </a>
            </nav>

            <div class="admin-sidebar-footer">
                <div class="flex" style="align-items: center; gap: 8px; margin-bottom: 8px;">
                    <div style="width: 32px; height: 32px; border-radius: 50%; background: rgba(255,255,255,0.2); display: flex; align-items: center; justify-content: center;">管</div>
                    <div style="flex: 1;">
                        <div style="font-size: 14px;">管理员</div>
                        <div class="text-small" style="opacity: 0.7;">admin@taopiaopiao.com</div>
                    </div>
                </div>
                <a href="#" class="logout-btn" style="color: rgba(255,255,255,0.5); font-size: 13px;">退出登录</a>
            </div>
        </aside>

        <!-- 主内容区 -->
        <main class="admin-main">
            <header class="admin-header">
                <div class="admin-header-title">新建演出</div>
                <div class="admin-header-actions">
                    <a href="admin-events.html" class="btn btn-secondary">返回列表</a>
                </div>
            </header>

            <div class="admin-content">
                <form id="eventForm" class="admin-form">
                    <!-- 基本信息 -->
                    <div class="admin-form-section">
                        <div class="admin-form-section-title">基本信息</div>
                        <div class="admin-form-row">
                            <div class="form-group">
                                <label class="form-label">演出名称 <span style="color: #d32f2f;">*</span></label>
                                <input type="text" class="form-input" name="name" placeholder="请输入演出名称" required>
                            </div>
                            <div class="form-group">
                                <label class="form-label">演出类型 <span style="color: #d32f2f;">*</span></label>
                                <select class="form-select" name="type" required>
                                    <option value="">请选择类型</option>
                                    <option value="concert">演唱会</option>
                                    <option value="theatre">话剧歌剧</option>
                                    <option value="exhibition">展览休闲</option>
                                    <option value="sports">体育</option>
                                    <option value="kids">儿童亲子</option>
                                    <option value="music">音乐</option>
                                    <option value="dance">舞蹈芭蕾</option>
                                </select>
                            </div>
                        </div>
                        <div class="admin-form-row">
                            <div class="form-group">
                                <label class="form-label">艺人/主办方 <span style="color: #d32f2f;">*</span></label>
                                <input type="text" class="form-input" name="artist" placeholder="请输入艺人或主办方名称" required>
                            </div>
                            <div class="form-group">
                                <label class="form-label">城市 <span style="color: #d32f2f;">*</span></label>
                                <input type="text" class="form-input" name="city" placeholder="请输入所在城市" required>
                            </div>
                        </div>
                        <div class="admin-form-row">
                            <div class="form-group">
                                <label class="form-label">副标题</label>
                                <input type="text" class="form-input" name="subtitle" placeholder="如：嘉年华世界巡回演唱会-上海站">
                            </div>
                            <div class="form-group">
                                <label class="form-label">演出时长（分钟）</label>
                                <input type="number" class="form-input" name="duration" placeholder="请输入演出时长" min="1">
                            </div>
                        </div>
                    </div>

                    <!-- 时间信息 -->
                    <div class="admin-form-section">
                        <div class="admin-form-section-title">时间信息</div>
                        <div class="admin-form-row">
                            <div class="form-group">
                                <label class="form-label">演出开始日期</label>
                                <input type="date" class="form-input" name="eventStartDate">
                            </div>
                            <div class="form-group">
                                <label class="form-label">演出结束日期</label>
                                <input type="date" class="form-input" name="eventEndDate">
                            </div>
                        </div>
                    </div>

                    <!-- 预售时间 -->
                    <div class="admin-form-section">
                        <div class="admin-form-section-title">预售时间</div>
                        <div class="admin-form-row">
                            <div class="form-group">
                                <label class="form-label">开售时间 <span style="color: #d32f2f;">*</span></label>
                                <input type="datetime-local" class="form-input" name="saleStartTime" required>
                            </div>
                            <div class="form-group">
                                <label class="form-label">停售时间</label>
                                <input type="datetime-local" class="form-input" name="saleEndTime">
                            </div>
                        </div>
                    </div>

                    <!-- 演出详情 -->
                    <div class="admin-form-section">
                        <div class="admin-form-section-title">演出详情</div>
                        <div class="form-group">
                            <label class="form-label">演出海报</label>
                            <div class="image-upload-container">
                                <div class="image-upload-preview" id="coverImagePreview">
                                    <div class="image-upload-placeholder" id="coverPlaceholder">
                                        <span style="font-size: 48px; display: block; margin-bottom: 8px;">📷</span>
                                        <span>点击上传或拖拽图片到此处</span>
                                        <span class="text-small text-muted">支持 JPG、PNG、GIF 格式，最大 5MB</span>
                                    </div>
                                    <img id="coverImageImg" style="display: none; width: 100%; height: 100%; object-fit: cover;" alt="海报预览">
                                </div>
                                <input type="file" id="coverImageFile" accept="image/*" style="display: none;">
                                <div class="image-upload-actions">
                                    <button type="button" class="btn btn-secondary btn-small" onclick="document.getElementById('coverImageFile').click()">选择图片</button>
                                    <button type="button" class="btn btn-outline btn-small" id="removeCoverBtn" style="display: none;" onclick="removeCoverImage()">删除</button>
                                </div>
                                <input type="hidden" name="coverImage" id="coverImageInput">
                            </div>
                        </div>
                        <div class="form-group">
                            <label class="form-label">演出图片</label>
                            <input type="url" class="form-input" name="images" placeholder="请输入更多图片URL，用逗号分隔">
                            <div class="text-small text-muted" style="margin-top: 4px;">多图URL用英文逗号分隔</div>
                        </div>
                        <div class="form-group">
                            <label class="form-label">演出简介</label>
                            <textarea class="form-textarea" name="description" placeholder="请输入演出简介，将显示在演出详情页" rows="4"></textarea>
                        </div>
                        <div class="admin-form-row">
                            <div class="form-group">
                                <label class="form-label">温馨提示</label>
                                <textarea class="form-textarea" name="tips" placeholder="如：儿童入场提示、禁止携带物品等" rows="3"></textarea>
                            </div>
                            <div class="form-group">
                                <label class="form-label">购票须知</label>
                                <textarea class="form-textarea" name="refundPolicy" placeholder="如：退换票政策、实名制要求等" rows="3"></textarea>
                            </div>
                        </div>
                    </div>

                    <!-- 状态设置 -->
                    <div class="admin-form-section">
                        <div class="admin-form-section-title">状态设置</div>
                        <div class="form-group">
                            <label class="form-label">上架状态</label>
                            <div style="padding: 8px 0;">
                                <label style="margin-right: 24px; cursor: pointer;">
                                    <input type="radio" name="status" value="draft"> 草稿
                                </label>
                                <label style="margin-right: 24px; cursor: pointer;">
                                    <input type="radio" name="status" value="on_sale" checked> 立即上架
                                </label>
                                <label style="margin-right: 24px; cursor: pointer;">
                                    <input type="radio" name="status" value="off_sale"> 下架
                                </label>
                            </div>
                        </div>
                        <div class="form-group">
                            <label class="form-label">标签设置</label>
                            <div style="padding: 8px 0;">
                                <label style="margin-right: 24px; cursor: pointer;">
                                    <input type="checkbox" name="tags[]" value="recommended"> 首页推荐
                                </label>
                                <label style="margin-right: 24px; cursor: pointer;">
                                    <input type="checkbox" name="tags[]" value="hot"> 热门演出
                                </label>
                                <label style="margin-right: 24px; cursor: pointer;">
                                    <input type="checkbox" name="tags[]" value="coming_soon"> 即将开售
                                </label>
                            </div>
                        </div>
                    </div>

                    <!-- 表单操作按钮 -->
                    <div class="admin-form-actions">
                        <button type="button" class="btn btn-secondary" id="cancelBtn">取消</button>
                        <button type="submit" class="btn btn-primary" id="submitBtn">发布演出</button>
                    </div>
                </form>
            </div>
        </main>
    </div>
<script src="/assets/js/auth-check.js"></script>
<script src="/assets/js/auth.js"></script>
<script src="/assets/js/api.js"></script>
<script src="/assets/js/event-edit.js"></script>
</body>
</html>
